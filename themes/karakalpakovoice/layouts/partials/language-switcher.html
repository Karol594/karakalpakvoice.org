<select onchange="location = this.value;">
    {{ $currentLang := .Language.Lang }}
    {{ range .Site.Languages }}
        {{ $url := "/" }}
        {{ if ne .Lang .Site.DefaultContentLang }}
            {{ $url = printf "/%s/" .Lang }}
        {{ end }}
        <option value="{{ $url }}" {{ if eq .Lang $currentLang }}selected{{ end }}>
            {{ .LanguageName }}
        </option>
    {{ end }}
</select>
