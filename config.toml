baseURL = "https://karakalpakvoice.org"
title = "Karakalpak Voice"
theme = "karakalpakvoice"
defaultContentLanguage = "ru"
defaultContentLanguageInSubdir = true

# Көптілді конфигурация
[languages]
  [languages.ru]
    title = "Каракалпакский Голос"
    weight = 1
    languageName = "Русский"
    languageCode = "ru"
    [languages.ru.params]
      description = "Голос каракалпакского народа"
      flag = "🇷🇺"
    [languages.ru.menu]
      [[languages.ru.menu.main]]
        name = "Главная"
        url = "/"
        weight = 10
      [[languages.ru.menu.main]]
        name = "Статьи"
        url = "/posts/"
        weight = 20
      [[languages.ru.menu.main]]
        name = "Категории"
        url = "/categories/"
        weight = 30
      [[languages.ru.menu.main]]
        name = "О нас"
        url = "/about/"
        weight = 40

  [languages.kk]
    title = "Қарақалпақ Даўысы"
    weight = 2
    languageName = "Қарақалпақша"
    languageCode = "kk"
    [languages.kk.params]
      description = "Қарақалпақ халқының даўысы"
      flag = "🏳️"
    [languages.kk.menu]
      [[languages.kk.menu.main]]
        name = "Бас бет"
        url = "/kk/"
        weight = 10
      [[languages.kk.menu.main]]
        name = "Мақалалар"
        url = "/kk/posts/"
        weight = 20
      [[languages.kk.menu.main]]
        name = "Категория"
        url = "/kk/categories/"
        weight = 30
      [[languages.kk.menu.main]]
        name = "Биз туўралы"
        url = "/kk/about/"
        weight = 40

  [languages.en]
    title = "Karakalpak Voice"
    weight = 3
    languageName = "English"
    languageCode = "en"
    [languages.en.params]
      description = "Voice of Karakalpak people"
      flag = "🇺🇸"
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "Home"
        url = "/en/"
        weight = 10
      [[languages.en.menu.main]]
        name = "Posts"
        url = "/en/posts/"
        weight = 20
      [[languages.en.menu.main]]
        name = "Categories"
        url = "/en/categories/"
        weight = 30
      [[languages.en.menu.main]]
        name = "About"
        url = "/en/about/"
