  [languages.pl]
    title = "Głos Karakałpaków"
    weight = 4
    languageName = "Polski"
    languageCode = "pl"
    [languages.pl.params]
      description = "Głos narodu karakałpackiego"
      flag = "🇵🇱"
    [languages.pl.menu]
      [[languages.pl.menu.main]]
        name = "Strona główna"
        url = "/pl/"
        weight = 10
      [[languages.pl.menu.main]]
        name = "Artykuły"
        url = "/pl/posts/"
        weight = 20
      [[languages.pl.menu.main]]
        name = "Kategorie"
        url = "/pl/categories/"
        weight = 30
      [[languages.pl.menu.main]]
        name = "O nas"
        url = "/pl/about/"
        weight = 40

# Улыўма параметрлер
[params]
  author = "Karakalpak Voice Team"
  description = "Voice of Karakalpak people worldwide"
  keywords = "karakalpak, voice, culture, news, aral sea"
  
  # Social Media
  [params.social]
    twitter = "https://twitter.com/karakalpakvoice"
    facebook = "https://facebook.com/karakalpakvoice"
    telegram = "https://t.me/karakalpakvoice"
    youtube = "https://youtube.com/@karakalpakvoice"
    instagram = "https://instagram.com/karakalpakvoice"
  
  # Crypto донация
  [params.crypto]
    bitcoin = "bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh"
    ethereum = "0x8ba1f109551bD432803012645Hac136c46Fek1"
  
  # Analytics
  [params.analytics]
    matomo_url = "https://analytics.karakalpakvoice.org"
    matomo_site_id = "1"
  
  # Features
  [params.features]
    search = true
    darkmode = true
    pwa = true
    tts = true
    qrcode = true
    comments = true
    newsletter = true

# Таксономия
[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"

# Markdown конфигурациясы
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = true
    noClasses = false

# Outputs
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

# Pagination
paginate = 12
paginatePath = "page"

# Other settings
enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

# Build settings
[build]
  writeStats = true
  
[sitemap]
  changefreq = "weekly"
  priority = 0.5

# Security
[security]
  [security.funcs]
    getenv = ["^HUGO_", "^CI$"]

# Related content
[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    name = "keywords"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "categories"
    weight = 60
  [[related.indices]]
    name = "date"
    weight = 10

# Image processing
[imaging]
  resampleFilter = "lanczos"
  quality = 85
  anchor = "smart"

# Minification
[minify]
  disableXML = true
  minifyOutput = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepDocumentTags = true
      keepEndTags = true
      keepDefaultAttrVals = true
