baseURL = "https://karakalpakvoice.org/"
languageCode = "ru"
defaultContentLanguage = "ru"
title = "Каракалпак Voice"
theme = "karakalpakvoice"

[params]
description = "Независимая информационная платформа №1 Каракалпакстана"
dark_mode = true

# Көптиллик настройкалар (Бас тил - орыс)
[languages]
[languages.ru]
languageName = "🇷🇺 Русский"
weight = 1
contentDir = "content/ru"
title = "Каракалпак Voice"
[languages.ru.params]
description = "Независимая информационная платформа №1 Каракалпакстана"

[languages.kk]
languageName = "🏳️ Қарақалпақша"
weight = 2
contentDir = "content/kk"
title = "Қарақалпақ Voice"
[languages.kk.params]
description = "Қарақалпақстанның №1 Ғәрезсиз мәлимлеме платформасы"

[languages.en]
languageName = "🇺🇸 English"
weight = 3
contentDir = "content/en"
title = "Karakalpak Voice"
[languages.en.params]
description = "Independent information platform №1 of Karakalpakstan"

[languages.pl]
languageName = "🇵🇱 Polski"
weight = 4
contentDir = "content/pl"
title = "Karakalpak Voice"
[languages.pl.params]
description = "Niezależna platforma informacyjna №1 Karakałpacji"

