baseURL = "https://karakalpakvoice.org"
languageCode = "kk"
defaultContentLanguage = "kk"
title = "Қарақалпақ Дауысы"
theme = "karakalpakvoice"

# Multilingual Configuration
[languages]
  [languages.kk]
    languageName = "Қарақалпақша"
    weight = 1
    title = "Қарақалпақ Дауысы"
    [languages.kk.params]
      description = "Қарақалпақ халқының тәуелсіз дауысы"
      flag = "🏳️"

  [languages.ru]
    languageName = "Русский"
    weight = 2
    title = "Каракалпакский Голос"
    [languages.ru.params]
      description = "Независимый голос каракалпакского народа"
      flag = "🇷🇺"

  [languages.en]
    languageName = "English"
    weight = 3
    title = "Karakalpak Voice"
    [languages.en.params]
      description = "Independent voice of the Karakalpak people"
      flag = "🇺🇸"

  [languages.pl]
    languageName = "Polski"
    weight = 4
    title = "Głos Karakałpacki"
    [languages.pl.params]
      description = "Niezależny głos narodu karakałpackiego"
      flag = "🇵🇱"

[params]
  author = "Қарақалпақ Дауысы"
  description = "Қарақалпақ халқының тәуелсіз ақпараттық платформасы"
  keywords = ["қарақалпақстан", "арал", "егемендік", "жаңалықтар", "мәдениет"]
  
  # Site colors
  colorScheme = "auto"
  
  # Footer
  footer = "© 2025 Қарақалпақ Дауысы. Барлық құқықтар сақталған."

  # Social media
  [params.social]
    telegram = "https://t.me/karakalpakvoice"
    twitter = "https://twitter.com/karakalpakvoice"
    youtube = "https://youtube.com/@karakalpakvoice"
    facebook = "https://facebook.com/karakalpakvoice"

  # Crypto донация
  [params.crypto]
    bitcoin = "bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh"
    ethereum = "0x8ba1f109551bD432803012645Hac136c46Fek1"
  
  # Analytics
  [params.analytics]
    matomo_url = "https://analytics.karakalpakvoice.org"
    matomo_site_id = "1"
  
  # QARA-AI Configuration
  [params.qara_ai]
    enabled = true
    api_endpoint = "https://api.karakalpakvoice.org/qara-ai"
    models = ["claude", "gpt", "llama"]
  
  # Features
  [params.features]
    search = true
    darkmode = true
    pwa = true
    tts = true
    qrcode = true
    comments = true
    newsletter = true
    qara_ai_chat = true
    audio_bot = true
    youtube_bot = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Басты бет"
    url = "/"
    weight = 1
    
  [[menu.main]]
    identifier = "news"
    name = "Жаңалықтар"
    url = "/news/"
    weight = 2
    
  [[menu.main]]
    identifier = "politics"
    name = "Саясат"
    url = "/politics/"
    weight = 3
    
  [[menu.main]]
    identifier = "culture"
    name = "Мәдениет" 
    url = "/culture/"
    weight = 4
    
  [[menu.main]]
    identifier = "environment"
    name = "Экология"
    url = "/environment/"
    weight = 5

# Таксономия
[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"

# Markdown конфигурациясы
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = true
    noClasses = false

# Outputs
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

# Other settings
enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true
paginate = 12

# Security
[security]
  [security.funcs]
    getenv = ["^HUGO_", "^CI$"]

# Privacy
[privacy]
  [privacy.disqus]
    disable = false
  [privacy.googleAnalytics]
    disable = false
    anonymizeIP = true
  [privacy.instagram]
    disable = false
    simple = true
  [privacy.twitter]
    disable = false
    enableDNT = true
    simple = true
  [privacy.vimeo]
    disable = false
    enableDNT = true
    simple = true
  [privacy.youtube]
    disable = false
    privacyEnhanced = true

# Permalinks
[permalinks]
  posts = "/:year/:month/:slug/"
  news = "/news/:year/:month/:slug/"
  politics = "/politics/:year/:month/:slug/"
  culture = "/culture/:year/:month/:slug/"

# Related content
[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    name = "keywords"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "categories"
    weight = 60
  [[related.indices]]
    name = "date"
    weight = 10

# Image processing
[imaging]
  resampleFilter = "lanczos"
  quality = 85
  anchor = "smart"

# Minification
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  [minify.tdewolff]
    [minify.tdewolff.css]
      keepCSS2 = true
      precision = 0
    [minify.tdewolff.html]
      keepComments = false
      keepConditionalComments = true
      keepDefaultAttrVals = true
      keepDocumentTags = true
      keepEndTags = true
      keepQuotes = false
      keepWhitespace = false
    [minify.tdewolff.js]
      keepVarNames = false
      precision = 0
    [minify.tdewolff.json]
      precision = 0
    [minify.tdewolff.svg]
      precision = 0
    [minify.tdewolff.xml]
      keepWhitespace = false

# Module configuration
[module]
  [module.hugoVersion]
    extended = false
    min = "0.119.0"
